---
name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/**"
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Run yamllint
        run: |
          pipx run yamllint --strict .

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7  # v2
