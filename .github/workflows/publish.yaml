# yamllint disable rule:line-length
---
name: Publish APT repository

# Two entry points, ONE code path:
#   * workflow_dispatch       -> sign + deploy whatever is in the pool. On day
#                               zero the pool is empty => bootstrap (signed empty
#                               Release + pubkey.asc + .nojekyll, so Pages never
#                               404s). Per-run parameters come from inputs.
#   * repository_dispatch    -> steady-state ingest: pull a target repo's
#     (type: publish-deb)       released *.deb into the pool, then the same
#                               sign + deploy path. Parameters come from
#                               client_payload.
#
# NOTHING sensitive or environment-specific is hard-coded below: per-run knobs
# are inputs/client_payload, fixed signing config lives in repo *variables*
# (vars.*), and every sensitive values live in repo *secrets*.
on:
  workflow_dispatch:
    inputs:
      suite:
        default: trixie
        required: false
        description: Debian suite/codename
      component:
        default: main
        required: false
        description: Repository component
      arches:
        required: false
        default: amd64 arm64
        description: >-
          Space-separated real architectures (arch:all is added automatically)
      reason:
        required: false
        default: bootstrap or re-sign
        description: Why is the workflow being run manually? (bootstrap/re-sign/debug)

  repository_dispatch:
    types:
      - publish-deb

# Never cancel a publish mid-flight: a cancelled run could leave the durable
# `pool` branch half-committed or the signed index partially written. Queue.
concurrency:
  group: apt-publish
  cancel-in-progress: false

permissions:
  pages: write      # deploy to GitHub Pages
  contents: write   # commit the durable pool branch back
  id-token: write   # OIDC for actions/deploy-pages

# Per-run parameters: workflow_dispatch input -> repository_dispatch payload ->
# literal default (needed for the dispatch path, which has no inputs).
env:
  SUITE: ${{ github.event.inputs.suite || github.event.client_payload.suite || 'trixie' }}
  ARCHES: ${{ github.event.inputs.arches || github.event.client_payload.arches || 'amd64 arm64' }}
  COMPONENT: ${{ github.event.inputs.component || github.event.client_payload.component || 'main' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (workflow + apt-ftparchive.conf)
        uses: actions/checkout@v7

      - name: Checkout durable pool branch
        uses: actions/checkout@v7
        with:
          ref: pool
          path: _pool

      - name: Install apt-utils (apt-ftparchive) + gnupg + dpkg-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg dpkg-dev apt-utils

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v4
        with:
          # Pin to the newest stable release downloadable from
          # cache.agilebits.com. publish only READS via op, so the 2.35.0
          # `op item edit` stdin bug does not apply here; pinning keeps the
          # runtime reproducible.
          version: 2.35.0

      - id: gpg
        name: Load signing material into an ephemeral keyring
        env:
          OP_VAULT: ${{ secrets.OP_VAULT }}
          OP_ITEM: ${{ secrets.OP_GPG_ITEM }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          # Isolated keyring — never touches the runner's default GnuPG home.
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"

          export GNUPGHOME

          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"
          echo "allow-loopback-pinentry" > "${GNUPGHOME}/gpg-agent.conf"

          # CI bundle = signing subkeys only, PRIMARY STUBBED (no cert/revoke power).
          op read "${{ secrets.OP_REF_GPG_SUBKEYS }}" | gpg --batch --import
          op read "${{ secrets.OP_REF_GPG_PUBKEY }}" > "${RUNNER_TEMP}/pubkey.asc"
          op read "${{ secrets.OP_REF_GPG_PASSPHRASE }}" > "${RUNNER_TEMP}/pp"

          now="$(date -u +%s)"

          # --- Active / next signers are stored, NOT computed here ---
          # The `rotate-keys` workflow owns the schedule math and writes the authoritative
          # `active_fpr`/`next_fpr`/`fpr_idx` named fields. Publish reads them directly and
          # cross-checks them against the `gpg_subkey_fpr_N` table so a stale or corrupt
          # rotation can never sign with the wrong key.
          state_json="$(
            op item get "${OP_ITEM}" \
              --format json \
              --vault "${OP_VAULT}" \
              --fields label=fpr_idx \
              --fields label=next_fpr \
              --fields label=active_fpr \
              --fields label=gpg_subkey_fpr_0 \
              --fields label=gpg_subkey_fpr_1 \
              --fields label=gpg_subkey_fpr_2 \
              --fields label=gpg_subkey_fpr_3 \
              --fields label=gpg_subkey_fpr_4 \
              --fields label=gpg_subkey_fpr_5 \
              --fields label=gpg_subkey_fpr_6 \
              --fields label=gpg_subkey_fpr_7
          )"

          # Pull the three rotation-state fields by label.
          next_fpr="$(jq -r '.[]  | select(.label == "next_fpr")   | .value' <<< "${state_json}")"
          active_idx="$(jq -r '.[] | select(.label == "fpr_idx")    | .value' <<< "${state_json}")"
          active_fpr="$(jq -r '.[] | select(.label == "active_fpr") | .value' <<< "${state_json}")"

          # Fail loudly on empty / unseeded state (rotate-keys.yaml must run first).
          for field in active_fpr next_fpr active_idx; do
            value="${!field}"
            if [ -z "${value}" ] || [ "${value}" = "null" ] || [ "${value}" = "PENDING_ROTATION" ]; then
              echo "::error::1Password field for ${field} is empty/unseeded (${value:-<empty>}) — run rotate-keys.yaml before publishing"
              exit 1
            fi
          done

          # active_idx must be a plain integer within the pre-staged pool.
          if ! [[ "${active_idx}" =~ ^[0-9]+$ ]]; then
            echo "::error::fpr_idx is not an integer: '${active_idx}'"
            exit 1
          fi

          # Cross-check: the stored active/next fprs MUST match the authoritative
          # table at fpr_idx and fpr_idx+1. Guards against a desynced rotation.
          expected_active="$(jq -r --arg i "${active_idx}" '.[] | select(.label == "gpg_subkey_fpr_" + $i) | .value' <<< "${state_json}")"
          expected_next="$(jq -r --arg i "$(( active_idx + 1 ))" '.[] | select(.label == "gpg_subkey_fpr_" + $i) | .value' <<< "${state_json}")"

          if [ -z "${expected_active}" ] || [ "${expected_active}" = "null" ]; then
            echo "::error::no gpg_subkey_fpr_${active_idx} in 1Password — fpr_idx out of range for the staged pool"
            exit 1
          fi

          if [ "${active_fpr}" != "${expected_active}" ]; then
            echo "::error::active_fpr does not match gpg_subkey_fpr_${active_idx} — rotation state is desynced (inspect 1Password item)"
            exit 1
          fi

          # next_fpr equals the following subkey, or the active one at pool end.
          if [ -n "${expected_next}" ] && [ "${expected_next}" != "null" ]; then
            if [ "${next_fpr}" != "${expected_next}" ]; then
              echo "::error::next_fpr does not match gpg_subkey_fpr_$(( active_idx + 1 )) — rotation state is desynced (inspect 1Password item)"
              exit 1
            fi
          else
            if [ "${next_fpr}" != "${active_fpr}" ]; then
              echo "::error::at pool end next_fpr must equal active_fpr — rotation state is desynced (inspect 1Password item)"
              exit 1
            fi
          fi

          {
            echo "next_fpr=${next_fpr}"
            echo "active_idx=${active_idx}"
            echo "active_fpr=${active_fpr}"
          } >> "${GITHUB_OUTPUT}"

          # --- PUBLISH-TIME HARD FLOOR ---
          # apt gives clients NO "expires soon" warning — expiry is a silent cliff.
          # Refuse to publish if the NEWEST still-valid subkey expires < OVERLAP_DAYS out.
          newest_subkey_expiry=0

          while IFS=: read -r record_type _ _ _ _ _ expiry_epoch _; do
            if [ "${record_type}" != "sub" ]; then
              continue
            fi

            if [ -z "${expiry_epoch}" ]; then
              continue
            fi

            if [ "${expiry_epoch}" -gt "${newest_subkey_expiry}" ]; then
              newest_subkey_expiry="${expiry_epoch}"
            fi
          done < <(gpg --with-colons --list-keys "${{ vars.PRIMARY_FPR }}")

          min_required_expiry=$(( now + ${{ vars.OVERLAP_DAYS }} * 86400 ))

          if [ "${newest_subkey_expiry}" -lt "${min_required_expiry}" ]; then
            echo "::error::newest signing subkey expires in < ${{ vars.OVERLAP_DAYS }}d (exp=${newest_subkey_expiry} min_required_expiry=${min_required_expiry}) — refresh the keyring NOW"
            exit 1
          fi

          echo "signing keys validated; newest_subkey_expiry=${newest_subkey_expiry}"

      - name: Rehydrate build tree from the durable pool
        run: |
          set -euo pipefail
          
          mkdir -p site/pool
          
          if [ -d _pool/pool ]; then
            cp -a _pool/pool/. site/pool/
          fi

          find site/pool -name .gitkeep -delete 2>/dev/null || true

      - name: Verify durable pool integrity against its committed manifest
        env:
          ACTIVE_FPR: ${{ steps.gpg.outputs.active_fpr }}
        run: |
          set -euo pipefail

          # Ensure the provenance dir always exists so the reverse-check `find`
          # below is well-defined even on the first run.
          mkdir -p _pool/provenance

          manifest="_pool/pool.sha256"
          signature="_pool/pool.sha256.asc"

          # First-run / bootstrap tolerance: no manifest yet means there is
          # nothing to verify. This run will establish the first signed
          # manifest in the Persist step below.
          if [ ! -f "${manifest}" ] && [ ! -f "${signature}" ]; then
            echo "::notice::no pool manifest present yet; establishing it this run"
          else
            if [ ! -f "${manifest}" ] || [ ! -f "${signature}" ]; then
              echo "::error::pool manifest or its signature is missing (manifest=${manifest} signature=${signature})"
              exit 1
            fi

            # 1. The signature must verify against a key already imported into
            #    the ephemeral GNUPGHOME (offline primary + its signing subkeys).
            if ! gpg --verify "${signature}" "${manifest}"; then
              echo "::error::pool manifest signature verification failed"
              exit 1
            fi

            # 2. Every hash recorded in the manifest must still match on disk.
            if ! ( cd _pool && LC_ALL=C sha256sum --quiet --strict -c pool.sha256 ); then
              echo "::error::pool manifest checksum verification failed"
              exit 1
            fi

            # 3. Reverse check: no file may exist on disk that the manifest
            #    does not account for (catches out-of-band injection).
            actual_files="$(cd _pool && find pool provenance -type f ! -name .gitkeep | LC_ALL=C sort)"
            manifest_files="$(awk '{ sub(/^[^ ]+ [ *]/, ""); print }' _pool/pool.sha256 | LC_ALL=C sort)"
            if [ "${actual_files}" != "${manifest_files}" ]; then
              echo "::error::pool contains files not present in the signed manifest (possible out-of-band injection)"
              exit 1
            fi

            echo "pool integrity verified against signed manifest"
          fi

      - name: Ingest released .deb assets into the pool
        if: github.event_name == 'repository_dispatch'
        env:
          # Public targets: the repo's own GITHUB_TOKEN reads public releases.
          # PRIVATE targets would instead mint an App installation token via
          # actions/create-github-app-token (app-id in vars.APP_CLIENT_ID, key
          # from secrets.OP_REF_APP_KEY). Deferred until a private target exists.
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: ${{ github.event.client_payload.tag }}
          TARGET_REPO: ${{ github.event.client_payload.repo }}
        run: |
          set -euo pipefail
          test -n "${TARGET_TAG}"
          test -n "${TARGET_REPO}"
          
          mkdir -p incoming
          gh release download "${TARGET_TAG}" --repo "${TARGET_REPO}" --pattern '*.deb' --dir incoming
          
          shopt -s nullglob

          packages=(incoming/*.deb)
          
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "::error::no .deb assets on ${TARGET_REPO}@${TARGET_TAG}"
            exit 1
          fi
          
          # --- Provenance verification (Tier-2 hardening) ---
          # Reject anything that is not a published, attested asset of the exact
          # release named in the dispatch. Runs BEFORE the arch floor and pooling
          # so unverified bytes never enter the pool.

          # (1) The release must exist and be published (not a draft). A missing
          #     tag makes `gh api` non-zero, which set -e turns into a failure.
          release_json="$(gh api "repos/${TARGET_REPO}/releases/tags/${TARGET_TAG}")"
          is_draft="$(jq -r '.draft' <<<"${release_json}")"
          if [ "${is_draft}" != "false" ]; then
            echo "::error::${TARGET_REPO}@${TARGET_TAG} is a draft or missing (draft=${is_draft})"
            exit 1
          fi

          # (2) Every downloaded .deb must actually be an asset of that release.
          release_asset_names="$(jq -r '.assets[].name' <<<"${release_json}")"
          for package in "${packages[@]}"; do
            asset_name="$(basename "${package}")"
            if ! grep -Fxq "${asset_name}" <<<"${release_asset_names}"; then
              echo "::error::${asset_name} is not an asset of ${TARGET_REPO}@${TARGET_TAG}"
              exit 1
            fi
          done

          # (3) Every .deb must carry a valid SLSA build-provenance attestation
          #     whose signer identity is the target repo. Only the signing
          #     certificate identity is un-forgeable, so we pin --signer-repo and
          #     never assert on predicate contents.
          for package in "${packages[@]}"; do
            if ! gh attestation verify "${package}" --repo "${TARGET_REPO}" --signer-repo "${TARGET_REPO}"; then
              echo "::error::provenance attestation failed for $(basename "${package}") from ${TARGET_REPO}"
              exit 1
            fi
          done
          # --- end provenance verification ---
          
          # Validate the arch floor BEFORE pooling anything (no partial ingest):
          # each package name must be a single Architecture:all build OR provide
          # BOTH amd64 AND arm64 (extra arches allowed).
          declare -A arches_by_package
          for package in "${packages[@]}"; do
            package_name="$(dpkg-deb -f "${package}" Package)"
            package_arch="$(dpkg-deb -f "${package}" Architecture)"
            arches_by_package["${package_name}"]="${arches_by_package[${package_name}]:-} ${package_arch}"
          done

          for package_name in "${!arches_by_package[@]}"; do
            arches="${arches_by_package[${package_name}]}"
            found_all=0; found_amd64=0; found_arm64=0
            for arch in ${arches}; do
              case "${arch}" in
                all)   found_all=1 ;;
                amd64) found_amd64=1 ;;
                arm64) found_arm64=1 ;;
              esac
            done
            if [ "${found_all}" -eq 0 ] && { [ "${found_amd64}" -eq 0 ] || [ "${found_arm64}" -eq 0 ]; }; then
              echo "::error::${package_name} violates arch floor (has:${arches}); need 'all' or both amd64+arm64"
              exit 1
            fi
          done

          # Pool every asset (same-filename overwrite == dedup).
          for package in "${packages[@]}"; do
            package_name="$(dpkg-deb -f "${package}" Package)"
            pool_letter="${package_name:0:1}"
            dest="site/pool/${COMPONENT}/${pool_letter}/${package_name}"
            mkdir -p "${dest}"
            cp -f "${package}" "${dest}/"
            echo "pooled: ${dest}/$(basename "${package}")"
            # Record the pooled digest for this run's provenance record.
            sha256sum "${dest}/$(basename "${package}")" >> "${RUNNER_TEMP}/ingested.sha256"
          done

      - name: Build repository keyring package into the pool
        # Optional archive-keyring package: ships the dearmored signing cert so
        # installed clients receive rotations via `apt upgrade`. Built BEFORE the
        # indices, so it is indexed + signed like any other pooled package. The
        # bootstrap tarball (below) is unaffected and never depends on it.
        uses: ./.github/actions/build-keyring-deb
        with:
          pool-dir: site/pool
          component: ${{ env.COMPONENT }}
          pubkey-path: ${{ runner.temp }}/pubkey.asc
          active-idx: ${{ steps.gpg.outputs.active_idx }}

      - name: Build indices, Release, and dual-sign
        env:
          NEXT_FPR: ${{ steps.gpg.outputs.next_fpr }}
          ACTIVE_FPR: ${{ steps.gpg.outputs.active_fpr }}
        run: |
          set -euo pipefail
          cd site

          # Package indices — split the single scan by Architecture stanza:
          # arch:all goes into binary-all AND every real arch; a real-arch build
          # goes only into its own binary-<arch> index.
          apt-ftparchive packages pool > /tmp/Packages.full
          for arch in all $ARCHES; do
            dist="dists/${SUITE}/${COMPONENT}/binary-${arch}"
            mkdir -p "${dist}"
            awk -v target_arch="${arch}" '
              BEGIN { RS=""; FS="\n" }
              {
                stanza_arch=""
                for (line=1; line<=NF; line++)
                  if ($line ~ /^Architecture: /) stanza_arch=substr($line, 15)
                if (target_arch == "all") {
                  if (stanza_arch == "all") print $0 "\n"
                } else if (stanza_arch == "all" || stanza_arch == target_arch) {
                  print $0 "\n"
                }
              }
            ' /tmp/Packages.full > "${dist}/Packages"
            gzip -kf "${dist}/Packages"
          done

          # Release — static identity from the conf; per-run fields via -o overrides.
          apt-ftparchive \
            -c="${GITHUB_WORKSPACE}/apt-ftparchive.conf" \
            -o APT::FTPArchive::Release::Suite="${SUITE}" \
            -o APT::FTPArchive::Release::Codename="${SUITE}" \
            -o APT::FTPArchive::Release::Components="${COMPONENT}" \
            -o APT::FTPArchive::Release::Architectures="all ${ARCHES}" \
            release "dists/${SUITE}" > "dists/${SUITE}/Release"

          # Dual-sign (active + next subkey) — belt & suspenders rotation overlap.
          cd "dists/${SUITE}"

          gpg \
            --yes \
            --batch \
            --clearsign \
            --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/pp" \
            -u "${ACTIVE_FPR}!" \
            -u "${NEXT_FPR}!" \
            -o InRelease Release

          gpg \
            --yes \
            --batch \
            --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/pp" \
            -u "${ACTIVE_FPR}!" \
            -u "${NEXT_FPR}!" \
            -abs -o Release.gpg Release

      - name: Stage public key + Pages markers
        run: |
          set -euo pipefail
          
          cp "${RUNNER_TEMP}/pubkey.asc" site/pubkey.asc
          
          touch site/.nojekyll

      - name: Build bootstrap tarball
        run: |
          set -euo pipefail

          root="$(mktemp -d)"

          install -d -m 0755 "${root}/usr/share/keyrings" "${root}/etc/apt/sources.list.d"

          # dearmor the published cert into a binary keyring apt consumes via `signed-by`
          gpg --dearmor < site/pubkey.asc > "${root}/usr/share/keyrings/wondersmith-apt.gpg"
          chmod 0644 "${root}/usr/share/keyrings/wondersmith-apt.gpg"
          
          {
            printf 'deb [signed-by=/usr/share/keyrings/wondersmith-apt.gpg] ';
            printf 'https://the-wondersmith.github.io/apt %s %s\n' "${SUITE}" "${COMPONENT}";
          } > "${root}/etc/apt/sources.list.d/wondersmith.list"

          chmod 0644 "${root}/etc/apt/sources.list.d/wondersmith.list"

          tar -C "${root}" --owner=0 --group=0 --numeric-owner -czf site/bootstrap.tgz usr etc

          rm -rf "${root}"

      - name: Write signed provenance record
        env:
          ACTIVE_FPR: ${{ steps.gpg.outputs.active_fpr }}
        run: |
          set -euo pipefail

          mkdir -p _pool/provenance
          record="_pool/provenance/${GITHUB_RUN_ID}.txt"

          # Append-only, run-keyed audit record of what this run ingested and
          # signed. Committed to the pool branch and detach-signed with the active
          # subkey; also covered by the signed pool manifest (Diff B) and echoed
          # to the job summary for human auditing.
          {
            printf 'timestamp:   %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'run:         %s\n' "${GITHUB_RUN_ID}"
            printf 'run_url:     %s/%s/actions/runs/%s\n' \
              "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}"
            printf 'dispatcher:  %s\n' "${GITHUB_ACTOR}"
            printf 'event:       %s\n' "${GITHUB_EVENT_NAME}"
            printf 'source_repo: %s\n' "${{ github.event.client_payload.repo || 'manual' }}"
            printf 'source_tag:  %s\n' "${{ github.event.client_payload.tag || 'bootstrap' }}"
            printf 'active_fpr:  %s\n' "${ACTIVE_FPR}"
            printf 'assets:\n'
            if [ -f "${RUNNER_TEMP}/ingested.sha256" ]; then
              sed 's#^#  #' "${RUNNER_TEMP}/ingested.sha256"
            else
              printf '  none (re-sign / bootstrap; no assets ingested)\n'
            fi
          } > "${record}"

          gpg --yes --batch --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/pp" \
            -u "${ACTIVE_FPR}!" \
            --detach-sign --armor \
            -o "${record}.asc" "${record}"

          cat "${record}" >> "${GITHUB_STEP_SUMMARY}"
          echo "::notice::provenance recorded for run ${GITHUB_RUN_ID}"

      - name: Persist pool + mirrored public cert back to the pool branch
        env:
          ACTIVE_FPR: ${{ steps.gpg.outputs.active_fpr }}
        run: |
          set -euo pipefail
          
          rm -rf _pool/pool
          
          mkdir -p _pool/pool/main
          
          if [ -d site/pool ]; then
            cp -a site/pool/. _pool/pool/
          fi
          
          touch _pool/pool/main/.gitkeep
          
          # Reviewer M4: mirror the public cert into the pool as a resilience backup.
          cp "${RUNNER_TEMP}/pubkey.asc" _pool/pubkey.asc

          # Regenerate the pool manifest over the final contents (pool packages +
          # provenance records) and sign it with the active subkey. The next run
          # verifies this before trusting the pool.
          ( cd _pool && find pool provenance -type f ! -name .gitkeep | LC_ALL=C sort | xargs -r sha256sum > pool.sha256 )
          gpg --yes --batch --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/pp" \
            -u "${ACTIVE_FPR}!" \
            --detach-sign --armor \
            -o _pool/pool.sha256.asc _pool/pool.sha256
          
          cd _pool

          git config user.name  "wondersmith-apt-control-plane[bot]"
          git config user.email "github@wondersmith.dev"
          git add -A
          
          if git diff --cached --quiet; then
            echo "pool unchanged; nothing to commit"
          else
            git commit -m "pool: publish ${{ github.event.client_payload.tag || 'bootstrap' }} (${{ github.event.client_payload.repo || 'manual' }})"
            git push origin HEAD:pool
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
