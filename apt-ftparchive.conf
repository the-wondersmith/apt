// apt-ftparchive.conf
//
// STATIC identity of the Wondersmith APT repository. Everything that can vary
// per publish (suite, component, architectures) is passed at run time via
// -o APT::FTPArchive::Release::* overrides from the workflow, so the Release
// metadata can never diverge from the actual generated binary-<arch> indices.
//
// Consumed as:
//   apt-ftparchive -c=apt-ftparchive.conf \
//     -o APT::FTPArchive::Release::Suite=<suite> \
//     -o APT::FTPArchive::Release::Codename=<suite> \
//     -o APT::FTPArchive::Release::Components=<component> \
//     -o APT::FTPArchive::Release::Architectures="all <arches>" \
//     release dists/<suite> > dists/<suite>/Release

APT::FTPArchive::Release {
    Origin      "Wondersmith APT";
    Label       "Wondersmith APT";
    Description "Wondersmith APT repository";
};
